<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>적당한 스팸 판별기 (AI Spam Checker)</title>
</head>

<body>
    <h1>스팸 판별기</h1>
    <textarea id="text" rows="5" cols="60"
    placeholder="스팸으로 판단되는 텍스트를 입력하세요."></textarea><br><br>
    <button onclick="classify()">분류</button>
    <h3 id="result"></h3>
    
    <script>
        function classify() {
            const text = document.getElementById("text").value;
            
            // ISSUE1: empty input 처리
            const resut = document.getElementById("result");
            if(!text){
                resut.innerText = "메시지를 입력해주세요.";
                return;
            }

            fetch("/classify", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },  
                body: JSON.stringify({text})
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById("result").innerText =
                    "결과: " + data.label + " (score=" + data.score + ")";
            })
            .catch(() => {
                document.getElementById("result").innerText = "에러 발생";
            });
    }
    </script>
</body>
</html>
